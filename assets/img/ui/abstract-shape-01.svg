<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="vertexBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B7FF"/>
      <stop offset="100%" stop-color="#2563FF"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gran triángulo -->
  <polygon
      points="600,90 1080,950 120,950"
      fill="none"
      stroke="url(#vertexBlue)"
      stroke-width="2"
      opacity="0.12"
      filter="url(#glow)"/>

  <!-- V principal -->
  <path
      d="M310 280
         L600 860
         L890 280"
      fill="none"
      stroke="url(#vertexBlue)"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.18"/>

  <!-- Línea diagonal -->
  <line
      x1="600"
      y1="90"
      x2="960"
      y2="420"
      stroke="url(#vertexBlue)"
      stroke-width="2"
      opacity="0.16"/>

  <!-- Triángulos -->
  <polygon
      points="600,90 760,240 600,330"
      fill="url(#vertexBlue)"
      opacity="0.08"/>

  <polygon
      points="430,460 600,720 260,720"
      fill="url(#vertexBlue)"
      opacity="0.05"/>

  <polygon
      points="720,560 930,840 620,840"
      fill="url(#vertexBlue)"
      opacity="0.07"/>

  <!-- Círculos -->
  <circle
      cx="940"
      cy="230"
      r="9"
      fill="#00B7FF"
      opacity="0.28"/>

  <circle
      cx="260"
      cy="890"
      r="6"
      fill="#00B7FF"
      opacity="0.22"/>

  <circle
      cx="790"
      cy="620"
      r="4"
      fill="#00B7FF"
      opacity="0.30"/>

  <!-- Líneas técnicas -->
  <line
      x1="160"
      y1="1060"
      x2="1040"
      y2="1060"
      stroke="url(#vertexBlue)"
      stroke-width="1"
      opacity="0.10"/>

  <line
      x1="930"
      y1="120"
      x2="930"
      y2="980"
      stroke="url(#vertexBlue)"
      stroke-width="1"
      opacity="0.08"/>

  <!-- Marco flotante -->
  <rect
      x="150"
      y="150"
      width="900"
      height="900"
      rx="40"
      fill="none"
      stroke="url(#vertexBlue)"
      stroke-width="1"
      opacity="0.05"/>

</svg>