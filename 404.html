<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Vertex Studio</title>
    <meta name="description" content="La página que buscás no existe. Volvé al inicio de Vertex Studio.">
    <link rel="canonical" href="https://www.vertexdigital.com.ar/404.html">
    <!-- PEGAR AQUÍ TODO EL CSS DE INDEX.HTML -->
    <style>
        .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-code { font-family: var(--font-display); font-size: clamp(6rem, 15vw, 12rem); font-weight: 700; background: linear-gradient(135deg, #2D7FF9 0%, #00C2FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 1rem; }
        .error-message { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .error-description { color: var(--muted); margin-bottom: 2.5rem; max-width: 500px; }
    </style>
</head>
<body>
<div class="error-page">
    <div class="container">
        <div class="reveal">
            <div class="error-code">404</div>
            <h1 class="error-message">Página no encontrada</h1>
            <p class="error-description">Lo sentimos, la página que estás buscando no existe o fue movida. Pero podemos ayudarte a encontrar lo que necesitás.</p>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="index.html" class="btn btn-primary">Volver al Inicio</a>
                <a href="contacto.html" class="btn btn-outline">Contactar Soporte</a>
            </div>
        </div>
    </div>
</div>

<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
